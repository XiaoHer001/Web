<!DOCTYPE html>
<html lang="zh-CN">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">

    <title>MindAR Demo</title>

    <script src="/libs/aframe.min.js"></script>

    <script src="/libs/mindar-image-aframe.prod.js"></script>

    <style>
        html,
        body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        #status {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;

            background: rgba(0, 0, 0, .7);
            color: #fff;

            padding: 10px 16px;
            border-radius: 10px;

            font-family: sans-serif;
        }
    </style>

</head>

<body>

    <div id="status">
        等待识别图片...
    </div>

    <a-scene mindar-image="
imageTargetSrc: ./targets/XiaoHer.mind;
autoStart: true;
uiScanning: yes;
uiLoading: yes;
" color-space="sRGB" renderer="
colorManagement: true;
physicallyCorrectLights: true;
" vr-mode-ui="enabled:false" device-orientation-permission-ui="enabled:false" embedded>

        <!-- 模型资源 -->

        <a-assets>

            <a-asset-item id="robotModel" src="./assets/Cube.glb">
            </a-asset-item>

        </a-assets>

        <!-- 摄像头 -->

        <a-camera position="0 0 0" look-controls="enabled:false">
        </a-camera>

        <!-- 第0张识别图 -->

        <a-entity id="target0" mindar-image-target="targetIndex: 0">

            <a-gltf-model id="robot" src="#robotModel" position="0 0 0" rotation="0 0 0" scale="0.5 0.5 0.5"
                visible="true">

            </a-gltf-model>

        </a-entity>

    </a-scene>

    <script>

        const statusEl =
            document.getElementById("status");

        const target =
            document.querySelector("#target0");

        target.addEventListener("targetFound", () => {

            console.log("识别成功");

            statusEl.innerHTML =
                "✅ 图片已识别";

        });

        target.addEventListener("targetLost", () => {

            console.log("目标丢失");

            statusEl.innerHTML =
                "🔍 请对准识别图";

        });

    </script>

</body>

</html>
